<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <radialGradient id="g1" cx="20%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#9d6bff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#9d6bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#2ee6e6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2ee6e6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#ff2e88" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff2e88" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full background (square; center 630 band is the OG crop) -->
  <rect width="1200" height="1200" fill="#0b0f2a"/>
  <rect width="1200" height="1200" fill="url(#g1)"/>
  <rect width="1200" height="1200" fill="url(#g2)"/>
  <rect width="1200" height="1200" fill="url(#g3)"/>

  <!-- scattered pixel stars (within the 285..915 crop band) -->
  <g fill="#e7ecff" opacity="0.85">
    <rect x="120" y="360" width="4" height="4"/>
    <rect x="300" y="420" width="3" height="3"/>
    <rect x="980" y="380" width="4" height="4"/>
    <rect x="1080" y="500" width="3" height="3"/>
    <rect x="200" y="760" width="4" height="4"/>
    <rect x="1010" y="800" width="3" height="3"/>
    <rect x="760" y="350" width="3" height="3"/>
    <rect x="520" y="840" width="4" height="4"/>
  </g>
  <g>
    <rect x="160" y="470" width="5" height="5" fill="#2ee6e6"/>
    <rect x="1040" y="640" width="5" height="5" fill="#ff2e88"/>
    <rect x="90" y="610" width="5" height="5" fill="#ffcf3a"/>
    <rect x="900" y="760" width="5" height="5" fill="#8cff5a"/>
  </g>

  <!-- chunky pixel-border panel, centered on y=600 -->
  <rect x="90" y="435" width="1020" height="330" fill="#131a3f" stroke="#e7ecff" stroke-width="6"/>
  <rect x="78" y="423" width="1044" height="354" fill="none" stroke="#9d6bff" stroke-width="6"/>

  <text x="600" y="510" text-anchor="middle" font-family="Courier New, monospace" font-weight="700"
        font-size="26" letter-spacing="4" fill="#2ee6e6">★ PLAYER 1 HAS LEFT THE GAME ★</text>

  <text x="600" y="608" text-anchor="middle" font-family="Courier New, monospace" font-weight="800"
        font-size="96" fill="#ff2e88">PRANAV</text>

  <text x="600" y="668" text-anchor="middle" font-family="Courier New, monospace" font-weight="700"
        font-size="29" fill="#ffcf3a">THE LEGEND LEAVES THE LOBBY</text>

  <rect x="475" y="702" width="250" height="44" fill="#8cff5a"/>
  <text x="600" y="733" text-anchor="middle" font-family="Courier New, monospace" font-weight="800"
        font-size="24" fill="#0b0f2a">▶ PRESS START</text>
</svg>
